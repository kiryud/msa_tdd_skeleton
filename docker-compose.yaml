# ====================================================================================
# Docker Compose - 우리 동네 타임딜 공동구매 플랫폼
# ====================================================================================

# ====================================================================================
# SERVICES
# ====================================================================================

services:

    # ----------------------------------------------------------------------------------
    # NGINX - 리버스 프록시
    # ----------------------------------------------------------------------------------
    nginx:
        image: nginx                                # 컨테이너 이미지 이름
        container_name: nginx                       # 실행될 컨테이너 이름
        build: ./requirements/nginx                 # Dockerfile 위치
        depends_on:                                 # 아래 서비스들이 먼저 실행된 후 nginx 시작
            - backend
            - frontend
            - order
        restart: always                             # 종료 시 항상 자동 재시작
        ports:
            - "443:443"                             # 호스트 443 → 컨테이너 443 (HTTPS)
        volumes:
            - static_volume:/var/www/static         # 정적 파일 공유 볼륨 마운트
        networks:
            - intra                                 # 내부 네트워크 연결
        env_file:
            - .env                                  # 환경변수 파일 로드

    # ----------------------------------------------------------------------------------
    # FRONTEND - 사용자 UI 서버
    # ----------------------------------------------------------------------------------
    frontend:
        image: frontend
        container_name: frontend
        build: ./requirements/frontend
        depends_on:
            - backend                               # backend 먼저 실행 후 frontend 시작
        restart: always
        expose:
            - "3000"                                # 내부 네트워크에만 3000포트 오픈
        networks:
            - intra
        env_file:
            - .env

    # ----------------------------------------------------------------------------------
    # BACKEND - API 서버 (GraphQL, 선착순 처리)
    # ----------------------------------------------------------------------------------
    backend:
        image: backend
        container_name: backend
        build: ./requirements/backend
        depends_on:
            - db                                    # db 먼저 실행 후 backend 시작
            - redis                                 # redis 먼저 실행 후 backend 시작
        restart: always
        expose:
            - "8000"                                # 내부 네트워크에만 8000포트 오픈
        volumes:
            - static_volume:/var/www/static         # nginx와 정적 파일 공유
        networks:
            - intra
        env_file:
            - .env

    # ----------------------------------------------------------------------------------
    # ORDER - 주문 서비스 (선착순 주문 처리, 재고 정합성 보장)
    # ----------------------------------------------------------------------------------
    order:
        image: order                                # 컨테이너 이미지 이름
        container_name: order                       # 실행될 컨테이너 이름
        build: ./requirements/order                 # Dockerfile 위치
        depends_on:
            - db                                    # db 먼저 실행 후 order 시작
            - redis                                 # redis 먼저 실행 후 order 시작
        restart: always
        expose:
            - "8080"                                # 내부 네트워크에만 8080포트 오픈 (Spring Boot 기본 포트)
        networks:
            - intra
        env_file:
            - .env

    # ----------------------------------------------------------------------------------
    # DB - 데이터베이스 (유저, 공구 방, 주문 데이터)
    # ----------------------------------------------------------------------------------
    db:
        image: db
        container_name: db
        build: ./requirements/db
        restart: always
        expose:
            - "5432"                                # 내부 네트워크에만 5432포트 오픈 (PostgreSQL)
        volumes:
            - db_volume:/var/lib/postgresql/data    # DB 데이터 영구 저장
        networks:
            - intra
        env_file:
            - .env

    # ----------------------------------------------------------------------------------
    # REDIS - 캐시/큐 서버 (재고 원자 연산, 선착순 처리)
    # ----------------------------------------------------------------------------------
    redis:
        image: redis
        container_name: redis
        build: ./requirements/redis
        restart: always
        expose:
            - "6379"                                # 내부 네트워크에만 6379포트 오픈 (Redis)
        volumes:
            - redis_volume:/data                    # Redis 데이터 영구 저장
        networks:
            - intra
        env_file:
            - .env

# ====================================================================================
# NETWORKS
# ====================================================================================

networks:
    intra:                                          # 서비스 간 내부 통신용 네트워크
        driver: bridge                              # 브리지 방식 - 컨테이너끼리만 통신 가능

# ====================================================================================
# VOLUMES
# ====================================================================================

volumes:
    db_volume:
        name: db_volume                             # 볼륨 이름
        driver: local                               # 로컬 호스트 스토리지 사용
        driver_opts:
            type: none
            device: /home/time_deal/volume/db       # 호스트 실제 저장 경로
            o: bind                                 # 호스트 경로를 그대로 마운트

    redis_volume:
        name: redis_volume
        driver: local
        driver_opts:
            type: none
            device: /home/time_deal/volume/redis    # 호스트 실제 저장 경로
            o: bind

    static_volume:
        name: static_volume
        driver: local
        driver_opts:
            type: none
            device: /home/time_deal/volume/static   # 호스트 실제 저장 경로 (nginx, backend 공유)
            o: bind
